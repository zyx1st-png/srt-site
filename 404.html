<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>404 · 选择性现实理论</title>
<style>
:root{--paper:#F6F3EB;--ink:#22261F;--ink-soft:#575C4F;--ink-faint:#868A7B;--line:#D8D3C0;--stay:#A97036;--stay-deep:#7C5023;--ret-deep:#255449}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",sans-serif;line-height:1.9;padding:32px}
.box{max-width:560px;text-align:center}
.box svg{width:96px;height:96px;margin-bottom:26px;opacity:.95}
.code{font-family:"JetBrains Mono","SFMono-Regular",Consolas,monospace;font-size:13px;letter-spacing:.3em;color:var(--stay-deep);margin-bottom:14px}
h1{font-family:ui-serif,Georgia,"Songti SC","STSong","Noto Serif SC",serif;font-size:30px;line-height:1.4;margin:0 0 14px}
p{color:var(--ink-soft);font-size:16px;margin:0 0 30px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;text-decoration:none;font-weight:600;font-size:15px;padding:11px 26px;border-radius:999px;background:var(--ret-deep);color:var(--paper);transition:.18s}
a.btn:hover{background:#1C4038}
a.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink-soft)}
a.btn.ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
</style>
</head>
<body>
<div class="box">
<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<defs><clipPath id="nc"><circle cx="110" cy="110" r="92"/></clipPath>
<marker id="nm" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3A7A6E"/></marker></defs>
<circle cx="110" cy="110" r="95" fill="none" stroke="#868A7B" stroke-width="1.6" opacity=".8"/>
<circle cx="110" cy="110" r="76" fill="none" stroke="#868A7B" stroke-width="1" stroke-dasharray="2 7" opacity=".5"/>
<g clip-path="url(#nc)">
<rect x="18" y="132" width="184" height="16" fill="#C9A176" opacity=".9"/>
<rect x="18" y="152" width="184" height="14" fill="#A97036" opacity=".8"/>
<rect x="18" y="170" width="184" height="32" fill="#7C5023" opacity=".75"/>
<path d="M18,132 h184 M18,152 h184 M18,170 h184" stroke="#F6F3EB" stroke-width="1.4" opacity=".5"/>
</g>
<path d="M74,131 C70,84 118,54 148,76 C170,92 168,116 152,128" fill="none" stroke="#3A7A6E" stroke-width="3" marker-end="url(#nm)" stroke-linecap="round" stroke-dasharray="5 7"/>
<circle cx="74" cy="131" r="5" fill="#7C5023"/>
</svg>
<div class="code">404 · NOT FOUND</div>
<h1>这个地址上没有沉积过页面</h1>
<p>它可能被移走、改名，或者从未被选中显现。从下面两个入口回到站内。</p>
<div class="btns">
<a class="btn" href="/srt-site/">回首页</a>
<a class="btn ghost" href="/srt-site/map.html">看全站地图</a>
</div>
</div>
</body>
</html>
